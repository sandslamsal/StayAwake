name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Compile & smoke-test (${{ matrix.os_label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_label: Linux
          - os: macos-latest
            os_label: macOS
          - os: windows-latest
            os_label: Windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Linux GUI libraries
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile all sources
        run: |
          python -m compileall -q stay_awake stay_awake_launcher.py build.py

      - name: Smoke-test imports
        shell: bash
        run: |
          python - <<'PY'
          from stay_awake import config, core, notifier
          from stay_awake.notifier import _parse_hhmm, DailyReminder
          assert _parse_hhmm("9:30") == (9, 30)
          assert _parse_hhmm("garbage") == (15, 0)
          r = DailyReminder()
          r.configure("15:00", "test", True)
          assert r.next_fire_at() is not None
          r.stop()
          print("smoke-test OK on", core.platform_label())
          PY
